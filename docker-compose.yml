name: microbin-zh

services:
  microbin:
    image: ${MICROBIN_IMAGE:-mmiimm/microbin-zh:latest}
    restart: unless-stopped
    ports:
      # Public service: 0.0.0.0:8080
      # Reverse proxy only: set MICROBIN_HOST_BIND=127.0.0.1
      - "${MICROBIN_HOST_BIND:-0.0.0.0}:${MICROBIN_HOST_PORT:-8080}:8080"
    volumes:
      # Named volume is the safest default because Docker creates it with
      # permissions that the non-root image user can write to.
      - microbin_data:/app/microbin_data
      # If you prefer a local folder, use the bind mount below instead:
      # - ./microbin-data:/app/microbin_data
    environment:
      # Change this before exposing the service to the public internet.
      MICROBIN_ADMIN_USERNAME: "${MICROBIN_ADMIN_USERNAME:-admin}"
      MICROBIN_ADMIN_PASSWORD: "${MICROBIN_ADMIN_PASSWORD:-change-this-admin-password}"

      MICROBIN_BIND: "0.0.0.0"
      MICROBIN_PORT: "8080"
      MICROBIN_DATA_DIR: "microbin_data"
      MICROBIN_TITLE: "${MICROBIN_TITLE:-MicroBin 中文增强版}"

      # Main sharing behavior.
      MICROBIN_NO_LISTING: "${MICROBIN_NO_LISTING:-false}"
      MICROBIN_PRIVATE: "${MICROBIN_PRIVATE:-true}"
      MICROBIN_ENABLE_READONLY: "${MICROBIN_ENABLE_READONLY:-true}"
      MICROBIN_EDITABLE: "${MICROBIN_EDITABLE:-true}"
      MICROBIN_READONLY: "${MICROBIN_READONLY:-false}"
      MICROBIN_DEFAULT_PRIVACY: "${MICROBIN_DEFAULT_PRIVACY:-public}"

      # Expiration and burn-after-read.
      MICROBIN_DEFAULT_EXPIRY: "${MICROBIN_DEFAULT_EXPIRY:-24hour}"
      MICROBIN_MAX_EXPIRY: "${MICROBIN_MAX_EXPIRY:-1week}"
      MICROBIN_GC_DAYS: "${MICROBIN_GC_DAYS:-90}"
      MICROBIN_ENABLE_BURN_AFTER: "${MICROBIN_ENABLE_BURN_AFTER:-true}"
      MICROBIN_DEFAULT_BURN_AFTER: "${MICROBIN_DEFAULT_BURN_AFTER:-0}"
      MICROBIN_ETERNAL_PASTA: "${MICROBIN_ETERNAL_PASTA:-false}"

      # File upload limits, in MB.
      MICROBIN_NO_FILE_UPLOAD: "${MICROBIN_NO_FILE_UPLOAD:-false}"
      MICROBIN_MAX_FILE_SIZE_ENCRYPTED_MB: "${MICROBIN_MAX_FILE_SIZE_ENCRYPTED_MB:-256}"
      MICROBIN_MAX_FILE_SIZE_UNENCRYPTED_MB: "${MICROBIN_MAX_FILE_SIZE_UNENCRYPTED_MB:-2048}"

      # Privacy and encryption options.
      MICROBIN_ENCRYPTION_SERVER_SIDE: "${MICROBIN_ENCRYPTION_SERVER_SIDE:-true}"
      MICROBIN_ENCRYPTION_CLIENT_SIDE: "${MICROBIN_ENCRYPTION_CLIENT_SIDE:-true}"
      MICROBIN_HASH_IDS: "${MICROBIN_HASH_IDS:-false}"

      # UI and runtime options.
      MICROBIN_HIGHLIGHTSYNTAX: "${MICROBIN_HIGHLIGHTSYNTAX:-true}"
      MICROBIN_SHOW_READ_STATS: "${MICROBIN_SHOW_READ_STATS:-true}"
      MICROBIN_HIDE_HEADER: "${MICROBIN_HIDE_HEADER:-false}"
      MICROBIN_HIDE_FOOTER: "${MICROBIN_HIDE_FOOTER:-false}"
      MICROBIN_HIDE_LOGO: "${MICROBIN_HIDE_LOGO:-false}"
      MICROBIN_PURE_HTML: "${MICROBIN_PURE_HTML:-false}"
      MICROBIN_WIDE: "${MICROBIN_WIDE:-false}"
      MICROBIN_QR: "${MICROBIN_QR:-false}"
      MICROBIN_DEFAULT_VIEW: "${MICROBIN_DEFAULT_VIEW:-gallery}"
      MICROBIN_THREADS: "${MICROBIN_THREADS:-1}"
      MICROBIN_JSON_DB: "${MICROBIN_JSON_DB:-false}"
      MICROBIN_DISABLE_UPDATE_CHECKING: "${MICROBIN_DISABLE_UPDATE_CHECKING:-true}"
      MICROBIN_DISABLE_TELEMETRY: "${MICROBIN_DISABLE_TELEMETRY:-true}"
      MICROBIN_LIST_SERVER: "${MICROBIN_LIST_SERVER:-false}"

      # Optional site-wide Basic Auth:
      # MICROBIN_BASIC_AUTH_USERNAME: "viewer"
      # MICROBIN_BASIC_AUTH_PASSWORD: "viewer-password"
      #
      # Optional public URL used when copying links and generating QR codes:
      # MICROBIN_PUBLIC_PATH: "https://share.example.com/"
      # MICROBIN_SHORT_PATH: "https://share.example.com/"
      #
      # Optional upload password, only used when MICROBIN_READONLY=true:
      # MICROBIN_UPLOADER_PASSWORD: "upload-password"
      #
      # Optional custom footer or CSS:
      # MICROBIN_FOOTER_TEXT: "Powered by MicroBin 中文增强版"
      # MICROBIN_CUSTOM_CSS: "https://example.com/microbin.css"

volumes:
  microbin_data:
